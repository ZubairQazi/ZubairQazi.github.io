name = "wedding-rsvp-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database binding ───────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "wedding-rsvp"
database_id = "398d8fd8-0583-4527-ae89-75f716492b7a"

# ── Environment variables (non-secret) ───────────────────
[vars]
ALLOWED_ORIGINS = "https://zubairqazi.github.io,https://zubairqazi.com,http://localhost:5050"
WEDDING_DATE = "2026-06-11"

# ── Secrets (set via: wrangler secret put SECRET_NAME) ───
# No secrets needed in this config — none stored here.

# ── Local dev ─────────────────────────────────────────────
# wrangler dev --local
# Create local D1: wrangler d1 execute wedding-rsvp --local --file=../../schema.sql
