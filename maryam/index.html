<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Join us to celebrate the wedding of Maryam &amp; Zubair — June 11–13, 2026 in San Diego, CA.">
  <meta name="robots" content="noindex, nofollow">
  <title>Maryam &amp; Zubair · June 2026</title>

  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Site CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="site-wrapper">

    <!-- ══════════════════════════ HERO ══════════════════════════ -->
    <header id="hero" class="container">

      <!-- Floral Illustration -->
      <div class="hero-floral">
        <img
          src="assets/floral-header.svg"
          alt="Floral botanical illustration"
          width="520"
          height="200"
          loading="eager"
        >
      </div>

      <!-- Names -->
      <h1 class="hero-names">
        Maryam <span class="ampersand">&amp;</span> Zubair
      </h1>

      <!-- Date + Location tagline -->
      <p class="hero-tagline">
        June 11–13, 2026 &nbsp;&middot;&nbsp; San Diego, CA
      </p>

      <!-- Countdown -->
      <div class="hero-countdown" aria-live="polite" aria-atomic="true">
        <span class="countdown-number" id="countdown-days">—</span>
        <span>Days to Go</span>
      </div>

    </header>

    <!-- ══════════════════════════ NAV ══════════════════════════ -->
    <nav id="main-nav" aria-label="Site navigation">
      <ul class="nav-list container">
        <li><a href="../" class="nav-link active" data-page="home">Home</a></li>
        <li><a href="../schedule/" class="nav-link" data-page="schedule">Schedule</a></li>
        <li><a href="../rsvp/" class="nav-link rsvp-nav-link" data-page="rsvp">RSVP</a></li>
      </ul>
    </nav>

    <!-- ══════════════════════════ MAIN GRID ══════════════════════════ -->
    <main>
      <div id="main-grid" class="container">

        <!-- Left Column -->
        <div class="main-left">
          <div class="main-date-block">
          <p class="main-date-day">June<br>11–13</p>
            <p class="main-date-full">Twenty Twenty-Six</p>
            <p class="main-location">
              <!-- Pin icon -->
              <svg aria-hidden="true" viewBox="0 0 24 24" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/>
              </svg>
              San Diego, California
            </p>
          </div>

          <!-- Divider -->
          <div class="divider" aria-hidden="true"></div>

          <!-- RSVP Button -->
          <a href="rsvp/" class="rsvp-btn" aria-label="RSVP to our wedding">
            RSVP
            <!-- Arrow icon -->
            <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </a>

          <!-- Small Photo -->
          <div class="photo-small-wrap">
            <img
              class="photo-card"
              src="assets/photo-small.svg"
              alt="Maryam and Zubair"
              width="400"
              height="300"
              loading="lazy"
            >
          </div>
        </div><!-- /.main-left -->

        <!-- Right Column -->
        <div class="main-right">
          <div class="photo-main-wrap">
            <img
              class="photo-card"
              src="assets/photo-main.svg"
              alt="Engagement portrait of Maryam and Zubair"
              width="600"
              height="800"
              loading="lazy"
            >
          </div>
        </div><!-- /.main-right -->

      </div><!-- /#main-grid -->
    </main>

    <!-- ══════════════════════════ FOOTER ══════════════════════════ -->
    <footer class="site-footer">
      <p>Made with love &middot; 2026</p>
    </footer>

  </div><!-- /.site-wrapper -->

  <!-- GSAP via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
  <!-- Home-specific JS -->
  <script src="js/home.js" defer></script>
</body>
</html>
