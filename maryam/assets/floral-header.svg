<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" fill="none" role="img" aria-label="Floral header decoration">
  <!-- Background hint -->
  <rect width="520" height="200" fill="none"/>

  <!-- Center stem -->
  <path d="M260 190 C260 150 260 120 260 80" stroke="#8B6F4E" stroke-width="1.5" stroke-linecap="round"/>

  <!-- LEFT BRANCH -->
  <path d="M260 120 C240 115 215 112 195 100" stroke="#8B6F4E" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <path d="M260 140 C232 138 200 130 175 118" stroke="#8B6F4E" stroke-width="1" stroke-linecap="round" fill="none"/>
  <path d="M260 155 C230 155 200 150 170 142" stroke="#8B6F4E" stroke-width="1" stroke-linecap="round" fill="none"/>

  <!-- RIGHT BRANCH -->
  <path d="M260 120 C280 115 305 112 325 100" stroke="#8B6F4E" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <path d="M260 140 C288 138 320 130 345 118" stroke="#8B6F4E" stroke-width="1" stroke-linecap="round" fill="none"/>
  <path d="M260 155 C290 155 320 150 350 142" stroke="#8B6F4E" stroke-width="1" stroke-linecap="round" fill="none"/>

  <!-- LEFT small leaves -->
  <ellipse cx="195" cy="98" rx="9" ry="14" fill="#C8B89A" opacity="0.5" transform="rotate(-30 195 98)"/>
  <ellipse cx="175" cy="116" rx="8" ry="13" fill="#C8B89A" opacity="0.4" transform="rotate(-20 175 116)"/>
  <ellipse cx="170" cy="140" rx="10" ry="7" fill="#C8B89A" opacity="0.4" transform="rotate(10 170 140)"/>
  <ellipse cx="205" cy="88" rx="6" ry="10" fill="#A89070" opacity="0.5" transform="rotate(-45 205 88)"/>
  <ellipse cx="185" cy="128" rx="7" ry="5" fill="#A89070" opacity="0.35" transform="rotate(-15 185 128)"/>

  <!-- RIGHT small leaves -->
  <ellipse cx="325" cy="98" rx="9" ry="14" fill="#C8B89A" opacity="0.5" transform="rotate(30 325 98)"/>
  <ellipse cx="345" cy="116" rx="8" ry="13" fill="#C8B89A" opacity="0.4" transform="rotate(20 345 116)"/>
  <ellipse cx="350" cy="140" rx="10" ry="7" fill="#C8B89A" opacity="0.4" transform="rotate(-10 350 140)"/>
  <ellipse cx="315" cy="88" rx="6" ry="10" fill="#A89070" opacity="0.5" transform="rotate(45 315 88)"/>
  <ellipse cx="335" cy="128" rx="7" ry="5" fill="#A89070" opacity="0.35" transform="rotate(15 335 128)"/>

  <!-- Center flowers (top) -->
  <!-- Big center flower -->
  <g transform="translate(260,60)">
    <ellipse cx="0" cy="-12" rx="6" ry="11" fill="#D4B896" opacity="0.75"/>
    <ellipse cx="0" cy="-12" rx="6" ry="11" fill="#D4B896" opacity="0.75" transform="rotate(45)"/>
    <ellipse cx="0" cy="-12" rx="6" ry="11" fill="#D4B896" opacity="0.75" transform="rotate(90)"/>
    <ellipse cx="0" cy="-12" rx="6" ry="11" fill="#D4B896" opacity="0.75" transform="rotate(135)"/>
    <ellipse cx="0" cy="-12" rx="6" ry="11" fill="#D4B896" opacity="0.75" transform="rotate(180)"/>
    <ellipse cx="0" cy="-12" rx="6" ry="11" fill="#D4B896" opacity="0.75" transform="rotate(225)"/>
    <ellipse cx="0" cy="-12" rx="6" ry="11" fill="#D4B896" opacity="0.75" transform="rotate(270)"/>
    <ellipse cx="0" cy="-12" rx="6" ry="11" fill="#D4B896" opacity="0.75" transform="rotate(315)"/>
    <circle cx="0" cy="0" r="7" fill="#8B6F4E" opacity="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#FAF8F4" opacity="0.8"/>
  </g>

  <!-- Left secondary flower -->
  <g transform="translate(220,95)">
    <ellipse cx="0" cy="-9" rx="4.5" ry="8" fill="#D4B896" opacity="0.65" transform="rotate(0)"/>
    <ellipse cx="0" cy="-9" rx="4.5" ry="8" fill="#D4B896" opacity="0.65" transform="rotate(60)"/>
    <ellipse cx="0" cy="-9" rx="4.5" ry="8" fill="#D4B896" opacity="0.65" transform="rotate(120)"/>
    <ellipse cx="0" cy="-9" rx="4.5" ry="8" fill="#D4B896" opacity="0.65" transform="rotate(180)"/>
    <ellipse cx="0" cy="-9" rx="4.5" ry="8" fill="#D4B896" opacity="0.65" transform="rotate(240)"/>
    <ellipse cx="0" cy="-9" rx="4.5" ry="8" fill="#D4B896" opacity="0.65" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="5" fill="#8B6F4E" opacity="0.55"/>
    <circle cx="0" cy="0" r="3" fill="#FAF8F4" opacity="0.8"/>
  </g>

  <!-- Right secondary flower -->
  <g transform="translate(300,95)">
    <ellipse cx="0" cy="-9" rx="4.5" ry="8" fill="#D4B896" opacity="0.65" transform="rotate(0)"/>
    <ellipse cx="0" cy="-9" rx="4.5" ry="8" fill="#D4B896" opacity="0.65" transform="rotate(60)"/>
    <ellipse cx="0" cy="-9" rx="4.5" ry="8" fill="#D4B896" opacity="0.65" transform="rotate(120)"/>
    <ellipse cx="0" cy="-9" rx="4.5" ry="8" fill="#D4B896" opacity="0.65" transform="rotate(180)"/>
    <ellipse cx="0" cy="-9" rx="4.5" ry="8" fill="#D4B896" opacity="0.65" transform="rotate(240)"/>
    <ellipse cx="0" cy="-9" rx="4.5" ry="8" fill="#D4B896" opacity="0.65" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="5" fill="#8B6F4E" opacity="0.55"/>
    <circle cx="0" cy="0" r="3" fill="#FAF8F4" opacity="0.8"/>
  </g>

  <!-- Small buds -->
  <ellipse cx="240" cy="78" rx="4" ry="7" fill="#C8B89A" opacity="0.5" transform="rotate(-20 240 78)"/>
  <ellipse cx="280" cy="78" rx="4" ry="7" fill="#C8B89A" opacity="0.5" transform="rotate(20 280 78)"/>
</svg>
